apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ibuki-bluearchive-api

resources:
  - deployment.yaml
  - service.yaml
  - pvc.yaml
  - ingress.yaml
  - pdb.yaml
  - hpa.yaml

images:
  - name: docker.io/kemar1/bluearchive-api
    newTag: v2.8.0
  - name: docker.io/kemar1/bluearchive-api-go
    newTag: v2.8.0

configMapGenerator:
  - name: students-config
    files:
      - students.json=data/students.json

generatorOptions:
  disableNameSuffixHash: false
