apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bluearchive-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bluearchive-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bluearchive-go-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bluearchive-go-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75