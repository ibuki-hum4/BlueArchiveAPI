# ------------------------------------------------------------------
# サンプルです。このファイル自体は kustomize から参照されておらず、
# 実際にクラスタへ apply されることはありません。
#
# 使い方:
#   1. 下記の値を実際の値に書き換える（特に ssh-privatekey）
#   2. このファイルから SealedSecret を生成する場合:
#      `kubeseal --format yaml < secret_sample.yaml > bluearchive-secrets.sealedsecret.yaml`
#      ※ kubectl create secret ... --dry-run=client -o yaml を経由する方法は
#        README.md を参照
#   3. 生成した bluearchive-secrets.sealedsecret.yaml を
#      manifests/base/secrets/ に置き、
#      manifests/base/kustomization.yaml の resources に追加する
#   4. このファイル（実値入りのコピー）はコミットしない
# ------------------------------------------------------------------

# DATABASE_URL と git push 用 Deploy Key を1つの Secret にまとめたもの。
# - bluearchive-go-api Deployment / bluearchive-export-students CronJob が
#   DATABASE_URL を環境変数として参照する
# - bluearchive-export-students CronJob が ssh-privatekey を
#   /etc/git-deploy-key/ssh-privatekey としてマウントする
apiVersion: v1
kind: Secret
metadata:
  name: bluearchive-secrets
  namespace: ibuki-bluearchive-api
type: Opaque
stringData:
  # クラスタ内の Postgres Service を指す接続文字列。
  # postgres-statefulset.yaml / postgres-service.yaml の設定（ユーザー: ba,
  # パスワード: ba, DB名: bluearchive, Service名: bluearchive-postgres）と
  # 一致させること。パスワードを変更している場合はそれに合わせる。
  DATABASE_URL: "postgres://ba:ba@bluearchive-postgres/bluearchive?sslmode=disable"

  # `ssh-keygen -t ed25519 -f deploy_key -N ""` で生成した秘密鍵(deploy_key)
  # の内容をそのまま貼り付ける。
  # 対応する公開鍵(deploy_key.pub)は GitHub リポジトリの
  # Settings > Deploy keys に "Allow write access" 付きで登録する。
  ssh-privatekey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    ここに deploy_key (秘密鍵ファイル) の内容をそのまま貼り付ける
    -----END OPENSSH PRIVATE KEY-----
