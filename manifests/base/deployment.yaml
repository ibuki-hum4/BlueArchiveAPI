apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluearchive-frontend
  labels:
    app: bluearchive-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bluearchive-frontend
  template:
    metadata:
      labels:
        app: bluearchive-frontend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bluearchive-frontend
          image: docker.io/kemar1/bluearchive-api
          command: [bun, run, start]
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "3000"
            - name: GO_API_ORIGIN
              value: "http://bluearchive-go-api"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "/api"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: students-config
              mountPath: /app/data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
      volumes:
        - name: students-config
          configMap:
            name: students-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluearchive-go-api
  labels:
    app: bluearchive-go-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bluearchive-go-api
  template:
    metadata:
      labels:
        app: bluearchive-go-api
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-students-data
          image: docker.io/kemar1/bluearchive-api-go
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/students.json ]; then
                cp /seed/students.json /data/students.json
              fi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: students-config
              mountPath: /seed
              readOnly: true
            - name: students-data
              mountPath: /data
              readOnly: false
      containers:
        - name: bluearchive-go-api
          image: docker.io/kemar1/bluearchive-api-go
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8080"
            - name: SITE_ORIGIN
              value: "https://bluearchive-api.skyia.jp"
            - name: RSS_STATE_PATH
              value: "/var/lib/bluearchive/rss-seen-ids.json"
            - name: STUDENTS_DATA_PATH
              value: "/app/data/students.json"
            - name: OGP_RENDERER_URL
              value: "http://bluearchive-og-renderer/render"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: students-data
              mountPath: /app/data
              readOnly: true
            - name: rss-state
              mountPath: /var/lib/bluearchive
              readOnly: false
      volumes:
        - name: students-config
          configMap:
            name: students-config
        - name: students-data
          persistentVolumeClaim:
            claimName: bluearchive-students-data
        - name: rss-state
          persistentVolumeClaim:
            claimName: bluearchive-rss-state
---
