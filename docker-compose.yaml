version: "3.8"
services:
  go-api:
    build: ./go-api
    environment:
      - RSS_STATE_PATH=/var/lib/bluearchive/rss-seen-ids.json
      # 開発用の既定値です。本番環境では必ず強力なパスワードに変更してください。
      - ADMIN_PASSWORD=changeme
    volumes:
      - ./data/students.json:/app/data/students.json
      - rssstate:/var/lib/bluearchive
    ports:
      - "8080:8080"

  og-renderer:
    build: ./og-renderer
    ports:
      - "8787:8787"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - GO_API_ORIGIN=http://go-api:8080
    volumes:
      - ./data/students.json:/app/data/students.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - go-api

volumes:
  rssstate:
