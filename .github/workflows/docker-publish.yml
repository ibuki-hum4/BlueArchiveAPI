name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bluearchive-api
  GO_API_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bluearchive-api-go
  OGP_RENDERER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bluearchive-og-renderer

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Normalize tag
        id: tag
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          clean="${raw/v./v}"
          nov="${clean#v}"
          echo "clean=${clean}" >> "$GITHUB_OUTPUT"
          echo "nov=${nov}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata for frontend image
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.clean }}
            type=raw,value=${{ steps.tag.outputs.nov }}
            type=raw,value=latest

      - name: Build and push frontend image
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata for go-api image
        id: go_api_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GO_API_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.clean }}
            type=raw,value=${{ steps.tag.outputs.nov }}
            type=raw,value=latest

      - name: Build and push go-api image
        id: go_api_build
        uses: docker/build-push-action@v6
        with:
          context: ./go-api
          file: ./go-api/Dockerfile
          push: true
          tags: ${{ steps.go_api_meta.outputs.tags }}
          labels: ${{ steps.go_api_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata for og-renderer image
        id: og_renderer_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OGP_RENDERER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.clean }}
            type=raw,value=${{ steps.tag.outputs.nov }}
            type=raw,value=latest

      - name: Build and push og-renderer image
        id: og_renderer_build
        uses: docker/build-push-action@v6
        with:
          context: ./og-renderer
          file: ./og-renderer/Dockerfile
          push: true
          tags: ${{ steps.og_renderer_meta.outputs.tags }}
          labels: ${{ steps.og_renderer_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image
        env:
          COSIGN_YES: "true"
        run: cosign sign ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.frontend_build.outputs.digest }}

      - name: Sign go-api image
        env:
          COSIGN_YES: "true"
        run: cosign sign ${{ env.REGISTRY }}/${{ env.GO_API_IMAGE_NAME }}@${{ steps.go_api_build.outputs.digest }}

      - name: Sign og-renderer image
        env:
          COSIGN_YES: "true"
        run: cosign sign ${{ env.REGISTRY }}/${{ env.OGP_RENDERER_IMAGE_NAME }}@${{ steps.og_renderer_build.outputs.digest }}
